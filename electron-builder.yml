appId: com.budget.personal-finance
productName: 个人收支预算管家
copyright: Copyright © 2026

directories:
  output: release

files:
  - dist/**/*
  - server/**/*
  - electron/**/*
  - main.cjs
  - package.json
  - "!node_modules/**/*"

asarUnpack:
  - node_modules/better-sqlite3/**/*

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 个人收支预算管家
  uninstallDisplayName: 个人收支预算管家

portable:
  artifactName: ${productName}-${version}-portable.${ext}

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.icns
  category: public.app-category.finance

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: assets/
  category: Finance
