// electron-builder.yml — Electron 打包配置
appId: com.budget.personal-finance
productName: 个人收支预算管家
copyright: Copyright © 2026

extraMetadata:
  main: main.cjs

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - server/**/*
  - electron/**/*
  - package.json

extraResources:
  - from: assets/
    to: assets/

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: assets/icon.ico
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 个人收支预算管家
  uninstallDisplayName: 个人收支预算管家

portable:
  artifactName: ${productName}-${version}-portable.${ext}

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.icns
  category: public.app-category.finance

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: assets/
  category: Finance
